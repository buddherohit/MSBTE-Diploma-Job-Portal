<!DOCTYPE html>

<html class="light" lang="en"><head>

                        "surface-dim": "#d8dadc",
                        "surface-container": "#eceef0",
                        "background": "#f7f9fb",
                        "surface-variant": "#e0e3e5",
                        "tertiary-container": "#00563a",

<style>
        .industrial-grid {
            background-image: radial-gradient(#CBD5E1 0.5px, transparent 0.5px);
            background-size: 24px 24px;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body-md industrial-grid min-h-screen flex flex-col">
<!-- Top Navigation (Shell suppressed for focused login journey per rules) -->
<header class="fixed top-0 w-full h-16 flex items-center justify-between px-margin-mobile bg-surface shadow-sm z-50">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="school">school</span>
<span class="font-headline-md text-headline-md font-bold text-primary tracking-tight">MahaResume</span>
</div>
</header>
<main class="flex-grow flex items-center justify-center px-margin-mobile py-24">
<div class="w-full max-w-[440px] animate-in fade-in slide-in-from-bottom-4 duration-700">
<!-- Branding & Title -->
<div class="text-center mb-stack-lg">
<h1 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary mb-2">Welcome Back</h1>
<p class="text-on-surface-variant font-body-md">Empowering Maharashtra's Diploma Talent</p>
</div>
<!-- Path Switcher (Student vs Employer) -->
<div class="bg-surface-container p-1 rounded-xl mb-stack-lg flex relative overflow-hidden">
<div class="absolute h-[calc(100%-8px)] w-[calc(50%-4px)] bg-primary-container rounded-lg transition-all duration-300 ease-out left-1 top-1" id="toggle-highlight"></div>
<button class="relative z-10 flex-1 py-3 text-label-md font-label-md transition-colors duration-200 text-on-primary" id="btn-student" onclick="switchTab('student')">
                    Student Login
                </button>
<button class="relative z-10 flex-1 py-3 text-label-md font-label-md transition-colors duration-200 text-on-surface-variant" id="btn-employer" onclick="switchTab('employer')">
                    Employer Login
                </button>
</div>
<!-- Form Card -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-8 shadow-sm">
<form class="space-y-stack-md" onsubmit="event.preventDefault();">
<!-- Dynamic Label -->
<div id="id-label-container">
<label class="block text-label-md font-label-md text-on-surface mb-2" for="user-id">Enrollment Number / Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="person">person</span>
<input class="w-full pl-12 pr-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-outline/50" id="user-id" placeholder="Enter your ID" type="text"/>
</div>
</div>
<div>
<div class="flex justify-between items-center mb-2">
<label class="block text-label-md font-label-md text-on-surface" for="password">Password</label>
<a class="text-label-sm font-label-sm text-primary hover:underline" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
<input class="w-full pl-12 pr-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-outline/50" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div class="flex items-center gap-2 pt-2">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary" id="remember" type="checkbox"/>
<label class="text-label-sm font-label-sm text-on-surface-variant" for="remember">Remember me for 30 days</label>
</div>
<button class="w-full bg-secondary text-on-secondary py-4 rounded-lg font-label-md text-label-md shadow-md hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                        Sign In
                        <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
<div class="relative py-4">
<div class="absolute inset-0 flex items-center"><div class="w-full border-t border-outline-variant"></div></div>
<div class="relative flex justify-center text-label-sm"><span class="bg-surface-container-lowest px-4 text-outline uppercase tracking-widest">or</span></div>
</div>
<button class="w-full bg-surface-container-lowest border border-primary text-primary py-4 rounded-lg font-label-md text-label-md hover:bg-primary/5 transition-colors" type="button">
                        Create an Account
                    </button>
</form>
</div>
<!-- Footer Links -->
<div class="mt-stack-lg text-center space-y-4">
<p class="text-label-sm font-label-sm text-on-surface-variant">
                    By signing in, you agree to our 
                    <a class="text-primary hover:underline" href="#">Terms of Service</a> &amp; 
                    <a class="text-primary hover:underline" href="#">Privacy Policy</a>
</p>
<div class="flex justify-center gap-6 text-outline">
<a class="hover:text-primary transition-colors flex items-center gap-1 text-label-sm font-label-sm" href="#">
<span class="material-symbols-outlined text-sm" data-icon="help">help</span> Help Center
                    </a>
<a class="hover:text-primary transition-colors flex items-center gap-1 text-label-sm font-label-sm" href="#">
<span class="material-symbols-outlined text-sm" data-icon="language">language</span> English (IN)
                    </a>
</div>
</div>
</div>
</main>
<!-- Side Graphics for Industrial Blueprint Aesthetic -->
<div class="fixed bottom-12 right-12 hidden lg:block opacity-20 pointer-events-none">
<div class="relative w-64 h-64 border-2 border-primary border-dashed rounded-full flex items-center justify-center">
<div class="w-48 h-48 border border-primary border-dashed rounded-full animate-[spin_20s_linear_infinite]"></div>
<span class="material-symbols-outlined text-primary text-8xl absolute" data-icon="engineering">engineering</span>
</div>
</div>
<script>
        function switchTab(type) {
            const highlight = document.getElementById('toggle-highlight');
            const studentBtn = document.getElementById('btn-student');
            const employerBtn = document.getElementById('btn-employer');
            const idLabel = document.querySelector('#id-label-container label');
            const idInput = document.querySelector('#user-id');

            if (type === 'student') {
                highlight.style.left = '4px';
                studentBtn.classList.add('text-on-primary');
                studentBtn.classList.remove('text-on-surface-variant');
                employerBtn.classList.add('text-on-surface-variant');
                employerBtn.classList.remove('text-on-primary');
                idLabel.textContent = 'Enrollment Number / Email';
                idInput.placeholder = 'Enter your ID';
            } else {
                highlight.style.left = 'calc(50% + 0px)';
                employerBtn.classList.add('text-on-primary');
                employerBtn.classList.remove('text-on-surface-variant');
                studentBtn.classList.add('text-on-surface-variant');
                studentBtn.classList.remove('text-on-primary');
                idLabel.textContent = 'Company Email / Corporate ID';
                idInput.placeholder = 'name@company.com';
            }
        }

        // Add micro-interaction for the password visibility toggle
        document.querySelectorAll('button[type="button"] .material-symbols-outlined[data-icon="visibility"]').forEach(btn => {
            btn.parentElement.addEventListener('click', function() {
                const input = this.previousElementSibling;
                if (input.type === 'password') {
                    input.type = 'text';
                    this.querySelector('span').textContent = 'visibility_off';
                } else {
                    input.type = 'password';
                    this.querySelector('span').textContent = 'visibility';
                }
            });
        });
    </script>
</body></html>
