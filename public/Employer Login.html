<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Employer Login | MahaResume MSBTE Diploma Jobs</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface": "#191c1e",
                        "outline": "#757684",
                        "primary": "#00288e",
                        "secondary": "#9d4300",
                        "background": "#f7f9fb",
                        "surface-container": "#eceef0",
                        "surface-container-low": "#f2f4f6",
                        "surface-container-lowest": "#ffffff",
                        "primary-container": "#1e40af",
                        "secondary-container": "#fd761a"
                    }
                }
            }
        }
    </script>
    <style>
        .industrial-grid {
            background-image: radial-gradient(#CBD5E1 0.5px, transparent 0.5px);
            background-size: 24px 24px;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body-md industrial-grid min-h-screen flex flex-col">
    <!-- Top Navigation -->
    <header class="fixed top-0 w-full h-16 flex items-center justify-between px-margin-mobile bg-surface shadow-sm z-50">
        <a class="flex items-center gap-2 cursor-pointer" href="home.html">
            <div class="w-10 h-10 rounded-lg bg-primary flex items-center justify-center text-white shadow-sm">
                <span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 1">school</span>
            </div>
            <div class="flex flex-col leading-none text-left">
                <span class="font-headline-md text-[20px] font-extrabold text-primary tracking-tight">MSBTE<span class="text-secondary-container">Jobs</span></span>
                <span class="text-[9px] font-bold text-on-surface-variant tracking-wider uppercase mt-0.5">Diploma Jobs Portal</span>
            </div>
        </a>
    </header>

    <main class="flex-grow flex items-center justify-center px-margin-mobile py-24">
        <div class="w-full max-w-[440px] animate-in fade-in slide-in-from-bottom-4 duration-700">
            <!-- Branding & Title -->
            <div class="text-center mb-8">
                <h1 class="text-3xl font-extrabold text-secondary mb-2">Employer Login</h1>
                <p class="text-on-surface-variant font-body-md">Connect with Maharashtra's top polytechnic technicians</p>
            </div>

            <!-- Path Switcher (Redirects to Student Login if clicked) -->
            <div class="bg-surface-container p-1 rounded-xl mb-8 flex relative overflow-hidden">
                <button class="relative z-10 flex-1 py-3 text-sm font-semibold transition-colors duration-200 text-on-surface-variant" onclick="window.location.href='Student Login.html?tab=student'">
                    Student Login
                </button>
                <button class="relative z-10 flex-1 py-3 text-sm font-semibold transition-colors duration-200 bg-white rounded-lg text-secondary shadow-sm">
                    Employer Login
                </button>
            </div>

            <!-- Form Card -->
            <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-8 shadow-sm">
                <form class="space-y-6" onsubmit="event.preventDefault(); window.location.href='../employer portal/Employer Dashboard  Industrial Blueprints Refined.html'">
                    <div>
                        <label class="block text-sm font-semibold text-on-surface mb-2" for="company-email">Company Email / Corporate ID</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="corporate_fare">corporate_fare</span>
                            <input class="w-full pl-12 pr-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg focus:ring-2 focus:ring-secondary focus:border-secondary outline-none transition-all placeholder:text-outline/50" id="company-email" placeholder="name@company.com" required type="email"/>
                        </div>
                    </div>

                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label class="block text-sm font-semibold text-on-surface" for="password">Password</label>
                            <a class="text-xs font-bold text-secondary hover:underline" href="Forgot Password.html">Forgot Password?</a>
                        </div>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
                            <input class="w-full pl-12 pr-12 py-3 bg-surface-container-low border border-outline-variant rounded-lg focus:ring-2 focus:ring-secondary focus:border-secondary outline-none transition-all placeholder:text-outline/50" id="password" placeholder="••••••••" required type="password"/>
                            <button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-secondary" type="button" onclick="togglePasswordVisibility()">
                                <span class="material-symbols-outlined" id="password-visibility-icon">visibility</span>
                            </button>
                        </div>
                    </div>

                    <div class="flex items-center gap-2">
                        <input class="w-4 h-4 rounded border-outline-variant text-secondary focus:ring-secondary" id="remember" type="checkbox"/>
                        <label class="text-xs font-semibold text-on-surface-variant" for="remember">Remember my organization</label>
                    </div>

                    <button class="w-full bg-secondary text-white py-4 rounded-lg font-bold shadow-md hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                        Sign In as Employer
                        <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
                    </button>

                    <div class="relative py-4">
                        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-outline-variant"></div></div>
                        <div class="relative flex justify-center text-xs"><span class="bg-surface-container-lowest px-4 text-outline uppercase tracking-widest">or</span></div>
                    </div>

                    <button class="w-full bg-surface-container-lowest border border-secondary text-secondary py-4 rounded-lg font-bold hover:bg-secondary/5 transition-colors" type="button" onclick="window.location.href='Employer Register.html'">
                        Register Your Organization
                    </button>
                </form>
            </div>

            <!-- Footer Links -->
            <div class="mt-8 text-center space-y-4">
                <p class="text-xs text-on-surface-variant">
                    By signing in, you agree to our 
                    <a class="text-secondary hover:underline ml-1" href="terms.html#terms">Terms of Service</a> &amp; 
                    <a class="text-secondary hover:underline ml-1" href="terms.html#privacy">Privacy Policy</a>
                </p>
                <div class="flex justify-center gap-6 text-outline">
                    <a class="hover:text-secondary transition-colors flex items-center gap-1 text-xs font-semibold" href="contact.html">
                        <span class="material-symbols-outlined text-sm" data-icon="help">help</span> Help Center
                    </a>
                    <a class="hover:text-secondary transition-colors flex items-center gap-1 text-xs font-semibold" href="#">
                        <span class="material-symbols-outlined text-sm" data-icon="language">language</span> English (IN)
                    </a>
                </div>
            </div>
        </div>
    </main>

    <!-- Side Graphics -->
    <div class="fixed bottom-12 right-12 hidden lg:block opacity-20 pointer-events-none">
        <div class="relative w-64 h-64 border-2 border-secondary border-dashed rounded-full flex items-center justify-center">
            <div class="w-48 h-48 border border-secondary border-dashed rounded-full animate-[spin_20s_linear_infinite]"></div>
            <span class="material-symbols-outlined text-secondary text-8xl absolute">factory</span>
        </div>
    </div>

    <script>
        function togglePasswordVisibility() {
            const input = document.getElementById('password');
            const icon = document.getElementById('password-visibility-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility';
            }
        }
    </script>
</body>
</html>
