<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Forgot Password | MahaResume MSBTE Diploma Jobs</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface": "#191c1e",
                        "outline": "#757684",
                        "primary": "#00288e",
                        "secondary": "#9d4300",
                        "background": "#f7f9fb",
                        "surface-container": "#eceef0",
                        "surface-container-low": "#f2f4f6",
                        "surface-container-lowest": "#ffffff",
                        "primary-container": "#1e40af",
                        "secondary-container": "#fd761a"
                    }
                }
            }
        }
    </script>
    <style>
        .industrial-grid {
            background-image: radial-gradient(#CBD5E1 0.5px, transparent 0.5px);
            background-size: 24px 24px;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body-md industrial-grid min-h-screen flex flex-col">
    <header class="fixed top-0 w-full h-16 flex items-center justify-between px-4 bg-surface shadow-sm z-50">
        <a class="flex items-center gap-2 cursor-pointer" href="home.html">
            <div class="w-10 h-10 rounded-lg bg-primary flex items-center justify-center text-white shadow-sm">
                <span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 1">school</span>
            </div>
            <div class="flex flex-col leading-none text-left">
                <span class="font-headline-md text-[20px] font-extrabold text-primary tracking-tight">MSBTE<span class="text-secondary-container">Jobs</span></span>
                <span class="text-[9px] font-bold text-on-surface-variant tracking-wider uppercase mt-0.5">Diploma Jobs Portal</span>
            </div>
        </a>
    </header>

    <main class="flex-grow flex items-center justify-center px-4 py-24">
        <div class="w-full max-w-[440px]">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-extrabold text-primary mb-2">Reset Password</h1>
                <p class="text-on-surface-variant text-sm">Enter your registered email address to receive password reset instructions.</p>
            </div>

            <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-8 shadow-sm">
                <form class="space-y-6" id="forgot-password-form" onsubmit="handleForgotPassword(event)">
                    <div id="email-field">
                        <label class="block text-sm font-semibold text-on-surface mb-2" for="email">Official / Registered Email</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="mail">mail</span>
                            <input class="w-full pl-12 pr-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-outline/50" id="email" placeholder="name@domain.com" required type="email"/>
                        </div>
                    </div>

                    <button class="w-full bg-primary text-white py-4 rounded-lg font-bold shadow-md hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                        Send Reset Link
                        <span class="material-symbols-outlined" data-icon="send">send</span>
                    </button>

                    <div class="text-center mt-4">
                        <a class="text-sm font-bold text-primary hover:underline flex items-center justify-center gap-1" href="Student Login.html">
                            <span class="material-symbols-outlined text-sm" data-icon="arrow_back">arrow_back</span> Back to Login
                        </a>
                    </div>
                </form>

                <div class="hidden space-y-6 text-center py-4" id="success-state">
                    <div class="w-16 h-16 rounded-full bg-green-100 flex items-center justify-center text-green-600 mx-auto">
                        <span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1">check_circle</span>
                    </div>
                    <div class="space-y-2">
                        <h2 class="text-xl font-bold text-on-surface">Link Sent Successfully!</h2>
                        <p class="text-on-surface-variant text-sm">We've sent a password reset link to <span class="font-bold text-on-surface" id="sent-email"></span>. Please check your inbox and spam folder.</p>
                    </div>
                    <button class="w-full bg-primary text-white py-3 rounded-lg font-bold hover:brightness-110 transition-all" onclick="resetForm()">
                        Resend Email
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        function handleForgotPassword(e) {
            e.preventDefault();
            const emailInput = document.getElementById('email');
            const emailValue = emailInput.value;
            
            // Simulating API request
            document.body.style.opacity = '0.7';
            setTimeout(() => {
                document.body.style.opacity = '1';
                document.getElementById('forgot-password-form').classList.add('hidden');
                document.getElementById('success-state').classList.remove('hidden');
                document.getElementById('sent-email').textContent = emailValue;
            }, 800);
        }

        function resetForm() {
            document.getElementById('forgot-password-form').classList.remove('hidden');
            document.getElementById('success-state').classList.add('hidden');
            document.getElementById('email').value = '';
        }
    </script>
</body>
</html>
