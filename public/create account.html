<style>

<body class="bg-background text-on-surface font-body-md min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="fixed top-0 w-full flex items-center justify-between px-margin-mobile w-full h-16 bg-surface shadow-sm z-50">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="school">school</span>
<h1 class="font-headline-md text-headline-md font-bold text-primary">MahaResume</h1>
</div>
<div class="hidden md:flex gap-gutter">
<a class="font-label-md text-on-surface-variant hover:text-primary transition-colors" href="#">About</a>
<a class="font-label-md text-on-surface-variant hover:text-primary transition-colors" href="#">Guidelines</a>
</div>
</header>
<main class="flex-grow flex items-center justify-center pt-24 pb-12 px-margin-mobile relative overflow-hidden">
<!-- Atmospheric Background Element -->
<div class="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary-container rounded-full blur-[100px]"></div>
<div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-secondary-container rounded-full blur-[100px]"></div>
</div>
<div class="max-w-container-max w-full flex flex-col items-center z-10">
<div class="text-center mb-stack-lg animate-in fade-in slide-in-from-bottom-4 duration-700">
<span class="bg-primary-fixed text-on-primary-fixed-variant px-4 py-1 rounded-full font-label-md text-label-md mb-4 inline-block">
                    Registration
                </span>
<h2 class="font-headline-lg text-headline-lg md:text-display-lg text-on-surface mb-stack-sm">Join MSBTE Diploma Jobs</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-2xl mx-auto">
                    Empowering Maharashtra's technical talent with high-impact career opportunities in industrial powerhouses.
                </p>
</div>
<!-- Path Selection Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter w-full max-w-4xl">
<!-- Student Card -->
<button class="role-card group text-left p-stack-lg bg-surface-container-lowest border border-outline-variant rounded-xl shadow-sm hover:shadow-lg flex flex-col items-center md:items-start focus:outline-none focus:ring-2 focus:ring-primary ring-offset-2" id="student-role" onclick="selectRole('student')">
<div class="w-16 h-16 rounded-full bg-primary-fixed flex items-center justify-center mb-stack-md group-hover:bg-primary transition-colors">
<span class="material-symbols-outlined text-primary text-4xl group-hover:text-on-primary" data-icon="school">school</span>
</div>
<h3 class="font-headline-md text-headline-md text-on-surface mb-stack-sm">I am a Student</h3>
<p class="font-body-md text-body-md text-on-surface-variant text-center md:text-left mb-stack-md">
                        Fresh graduate or final year student looking for industrial training, apprenticeships, or full-time roles in Maharashtra.
                    </p>
<div class="mt-auto flex items-center text-primary font-label-md gap-2 group-hover:translate-x-1 transition-transform">
                        Build My Profile <span class="material-symbols-outlined">arrow_forward</span>
</div>
</button>
<!-- Employer Card -->
<button class="role-card group text-left p-stack-lg bg-surface-container-lowest border border-outline-variant rounded-xl shadow-sm hover:shadow-lg flex flex-col items-center md:items-start focus:outline-none focus:ring-2 focus:ring-primary ring-offset-2" id="employer-role" onclick="selectRole('employer')">
<div class="w-16 h-16 rounded-full bg-secondary-fixed flex items-center justify-center mb-stack-md group-hover:bg-secondary transition-colors">
<span class="material-symbols-outlined text-secondary text-4xl group-hover:text-on-primary" data-icon="factory">factory</span>
</div>

                        Recruiter or business owner seeking skilled MSBTE diploma technicians for mechanical, civil, IT, or electronics roles.
                    </p>
<div class="mt-auto flex items-center text-secondary font-label-md gap-2 group-hover:translate-x-1 transition-transform">

</div>
</button>

                    Next Step <span class="material-symbols-outlined">chevron_right</span>
</button>

<script>
        let selectedRole = null;

        function selectRole(role) {
            selectedRole = role;
            
            // UI Update for cards
            document.querySelectorAll('.role-card').forEach(card => {
                card.classList.remove('selected', 'ring-2', 'ring-primary', 'bg-primary-fixed');
            });
            
            const selectedCard = document.getElementById(`${role}-role`);
            selectedCard.classList.add('selected', 'ring-2', 'ring-primary');
            
            // Enable button
            const nextBtn = document.getElementById('next-btn');
            nextBtn.disabled = false;
            nextBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            nextBtn.classList.add('opacity-100', 'cursor-pointer');
            
            // Update button color based on role if needed
            if(role === 'employer') {
                nextBtn.classList.remove('bg-primary');
                nextBtn.classList.add('bg-secondary');
            } else {
                nextBtn.classList.remove('bg-secondary');
                nextBtn.classList.add('bg-primary');
            }
        }

        document.getElementById('next-btn').addEventListener('click', () => {
            if (selectedRole) {
                // Flash effect before navigating
                document.body.style.opacity = '0.5';
                setTimeout(() => {
                    console.log(`Navigating to ${selectedRole} registration...`);
                    // In a real app: window.location.href = `/register/${selectedRole}`;
                    alert(`Proceeding to ${selectedRole} registration form.`);
                    document.body.style.opacity = '1';
                }, 300);
            }
        });
    </script>
