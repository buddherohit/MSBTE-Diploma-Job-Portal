</div>
<div>
<h2 class="text-headline-md font-headline-md text-on-surface">Aditya Ahire</h2>
<p class="text-body-md text-on-surface-variant font-medium">Mechanical Engineer</p>
<div class="flex items-center gap-1 text-label-md text-primary mt-1">
<span class="material-symbols-outlined text-[16px]">business</span>
<span>Thermax Limited</span>
</div>
</div>
</div>
</section>
<!-- Technical Skills Rating -->
<section class="mb-stack-lg">
<h3 class="text-label-md font-label-md text-outline uppercase tracking-wider mb-4">Technical Skills</h3>
<div class="space-y-6">
<!-- Skill 1 -->
<div class="flex flex-col gap-2">

<span class="text-label-md font-bold text-secondary" id="tech-rating-val">4.0</span>
</div>
<div class="flex gap-2">
<button class="rating-btn-tech group" onclick="setRating('tech', 1)"><span class="material-symbols-outlined star-active text-3xl">star</span></button>
<button class="rating-btn-tech group" onclick="setRating('tech', 2)"><span class="material-symbols-outlined star-active text-3xl">star</span></button>
<button class="rating-btn-tech group" onclick="setRating('tech', 3)"><span class="material-symbols-outlined star-active text-3xl">star</span></button>
<button class="rating-btn-tech group" onclick="setRating('tech', 4)"><span class="material-symbols-outlined star-active text-3xl">star</span></button>
<button class="rating-btn-tech group" onclick="setRating('tech', 5)"><span class="material-symbols-outlined text-outline-variant text-3xl">star</span></button>
</div>
</div>
<!-- Skill 2 -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="text-body-md font-semibold text-on-surface">Problem Solving</label>

<div class="flex gap-2">
<button class="rating-btn-problem group" onclick="setRating('problem', 1)"><span class="material-symbols-outlined text-outline-variant text-3xl">star</span></button>
<button class="rating-btn-problem group" onclick="setRating('problem', 2)"><span class="material-symbols-outlined text-outline-variant text-3xl">star</span></button>
<button class="rating-btn-problem group" onclick="setRating('problem', 3)"><span class="material-symbols-outlined text-outline-variant text-3xl">star</span></button>
<button class="rating-btn-problem group" onclick="setRating('problem', 4)"><span class="material-symbols-outlined text-outline-variant text-3xl">star</span></button>
<button class="rating-btn-problem group" onclick="setRating('problem', 5)"><span class="material-symbols-outlined text-outline-variant text-3xl">star</span></button>

<!-- Soft Skills Rating -->

<section class="mb-stack-lg">

<span class="text-label-sm font-bold">Strong Hire</span>
</button>

<span class="material-symbols-outlined text-primary mb-1 group-[.active]:font-fill" style="font-variation-settings: 'FILL' 1;">thumb_up</span>
<span class="text-label-sm font-bold">Hire</span>
</button>
<button class="rec-btn flex flex-col items-center justify-center p-3 border border-outline-variant rounded-xl bg-surface-container-lowest transition-all hover:bg-surface-container-high group" onclick="selectRec(this)">
<span class="material-symbols-outlined text-secondary-container mb-1">help</span>
<span class="text-label-sm font-bold">Maybe</span>
</button>
<button class="rec-btn flex flex-col items-center justify-center p-3 border border-outline-variant rounded-xl bg-surface-container-lowest transition-all hover:bg-surface-container-high group" onclick="selectRec(this)">
<span class="material-symbols-outlined text-error mb-1">cancel</span>
<span class="text-label-sm font-bold">Reject</span>
</button>
</div>

<!-- Action Buttons (Bottom Docked) -->
<div class="fixed bottom-0 left-0 right-0 p-4 bg-surface-container-lowest shadow-[0_-4px_12px_rgba(15,23,42,0.08)] flex gap-3 z-50">
<button class="flex-1 border-2 border-primary text-primary font-bold py-3 rounded-xl hover:bg-primary-fixed/20 transition-all active:scale-95">
            Save Draft
        </button>
<button class="flex-[2] bg-secondary-container text-on-secondary-fixed font-bold py-3 rounded-xl shadow-md hover:opacity-90 transition-all active:scale-95">
            Submit Feedback
        </button>
</div>
<script>
        function setRating(category, rating) {
            const buttons = document.querySelectorAll(`.rating-btn-${category}`);
            const valDisplay = document.getElementById(`${category}-rating-val`);
            
            buttons.forEach((btn, index) => {
                const icon = btn.querySelector('.material-symbols-outlined');
                if (index < rating) {
                    icon.classList.add('star-active');
                    icon.classList.remove('text-outline-variant');
                } else {
                    icon.classList.remove('star-active');
                    icon.classList.add('text-outline-variant');
                }
            });

            if(valDisplay) {
                valDisplay.textContent = rating.toFixed(1);
            }
        }

        function selectRec(element) {
            document.querySelectorAll('.rec-btn').forEach(btn => {
                btn.classList.remove('active', 'bg-primary-fixed/30', 'border-primary');
                const icon = btn.querySelector('.material-symbols-outlined');
                icon.style.fontVariationSettings = "'FILL' 0";
            });
            
            element.classList.add('active', 'bg-primary-fixed/30', 'border-primary');
            const activeIcon = element.querySelector('.material-symbols-outlined');
            activeIcon.style.fontVariationSettings = "'FILL' 1";
        }

        // Initialize Recommendation state
        window.onload = () => {
            const defaultActive = document.querySelector('.rec-btn.active');
            if (defaultActive) {
                defaultActive.classList.add('bg-primary-fixed/30', 'border-primary');
            }
        }
    </script>
